name: Deploy CRM

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  SHARED_SERVICES_ACCOUNT: ${{ vars.SHARED_SERVICES_ACCOUNT }}
  DEV_ACCOUNT: ${{ vars.DEV_ACCOUNT }}
  PROD_ACCOUNT: ${{ vars.PROD_ACCOUNT }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (shared services)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.SHARED_SERVICES_ACCOUNT }}:role/github-actions-crm
          aws-region: ${{ vars.AWS_REGION }}
          # OIDC role scoped to kabner/* repos only

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          docker build \
            -f Dockerfile.api \
            -t ${{ vars.ECR_REGISTRY }}/crm/api:${{ github.sha }} \
            -t ${{ vars.ECR_REGISTRY }}/crm/api:latest \
            .
          docker push ${{ vars.ECR_REGISTRY }}/crm/api:${{ github.sha }}
          docker push ${{ vars.ECR_REGISTRY }}/crm/api:latest

      - name: Build and push Web image (dev)
        run: |
          docker build \
            -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_API_URL=https://dev-crm.stowe.cloud \
            -t ${{ vars.ECR_REGISTRY }}/crm/web:${{ github.sha }}-dev \
            -t ${{ vars.ECR_REGISTRY }}/crm/web:dev \
            .
          docker push ${{ vars.ECR_REGISTRY }}/crm/web:${{ github.sha }}-dev
          docker push ${{ vars.ECR_REGISTRY }}/crm/web:dev

      - name: Build and push Web image (prod)
        run: |
          docker build \
            -f Dockerfile.web \
            --build-arg NEXT_PUBLIC_API_URL=https://crm.stowe.cloud \
            -t ${{ vars.ECR_REGISTRY }}/crm/web:${{ github.sha }} \
            -t ${{ vars.ECR_REGISTRY }}/crm/web:latest \
            .
          docker push ${{ vars.ECR_REGISTRY }}/crm/web:${{ github.sha }}
          docker push ${{ vars.ECR_REGISTRY }}/crm/web:latest

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Configure AWS credentials (shared services)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.SHARED_SERVICES_ACCOUNT }}:role/github-actions-crm
          aws-region: ${{ vars.AWS_REGION }}
          # OIDC role scoped to kabner/* repos only

      - name: Assume dev ECS deploy role (role chaining)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.DEV_ACCOUNT }}:role/ecs-deploy-role
          aws-region: ${{ vars.AWS_REGION }}
          role-chaining: true

      - name: Update ECS services
        run: |
          aws ecs update-service \
            --cluster crm-dev \
            --service crm-dev-api \
            --force-new-deployment \
            --region ${{ vars.AWS_REGION }}
          aws ecs update-service \
            --cluster crm-dev \
            --service crm-dev-web \
            --force-new-deployment \
            --region ${{ vars.AWS_REGION }}

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster crm-dev \
            --services crm-dev-api crm-dev-web \
            --region ${{ vars.AWS_REGION }}

      - name: Run database migrations
        run: |
          TASK_DEF=$(aws ecs describe-services --cluster crm-dev --services crm-dev-api --region ${{ vars.AWS_REGION }} --query 'services[0].taskDefinition' --output text)
          SUBNET=$(aws ecs describe-services --cluster crm-dev --services crm-dev-api --region ${{ vars.AWS_REGION }} --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets[0]' --output text)
          SG=$(aws ecs describe-services --cluster crm-dev --services crm-dev-api --region ${{ vars.AWS_REGION }} --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups[0]' --output text)
          TASK_ARN=$(aws ecs run-task --cluster crm-dev --task-definition "$TASK_DEF" --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["node","dist/database/run-migrations.js"]}]}' \
            --region ${{ vars.AWS_REGION }} --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster crm-dev --tasks "$TASK_ARN" --region ${{ vars.AWS_REGION }}
          EXIT_CODE=$(aws ecs describe-tasks --cluster crm-dev --tasks "$TASK_ARN" --region ${{ vars.AWS_REGION }} --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then echo "Migration failed with exit code $EXIT_CODE"; exit 1; fi

      - name: Smoke test
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            https://dev-crm.stowe.cloud/health

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: production
    steps:
      - name: Configure AWS credentials (shared services)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.SHARED_SERVICES_ACCOUNT }}:role/github-actions-crm
          aws-region: ${{ vars.AWS_REGION }}
          # OIDC role scoped to kabner/* repos only

      - name: Assume prod ECS deploy role (role chaining)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.PROD_ACCOUNT }}:role/ecs-deploy-role
          aws-region: ${{ vars.AWS_REGION }}
          role-chaining: true

      - name: Update ECS services
        run: |
          aws ecs update-service \
            --cluster crm-prod \
            --service crm-prod-api \
            --force-new-deployment \
            --region ${{ vars.AWS_REGION }}
          aws ecs update-service \
            --cluster crm-prod \
            --service crm-prod-web \
            --force-new-deployment \
            --region ${{ vars.AWS_REGION }}

      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster crm-prod \
            --services crm-prod-api crm-prod-web \
            --region ${{ vars.AWS_REGION }}

      - name: Run database migrations
        run: |
          TASK_DEF=$(aws ecs describe-services --cluster crm-prod --services crm-prod-api --region ${{ vars.AWS_REGION }} --query 'services[0].taskDefinition' --output text)
          SUBNET=$(aws ecs describe-services --cluster crm-prod --services crm-prod-api --region ${{ vars.AWS_REGION }} --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets[0]' --output text)
          SG=$(aws ecs describe-services --cluster crm-prod --services crm-prod-api --region ${{ vars.AWS_REGION }} --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups[0]' --output text)
          TASK_ARN=$(aws ecs run-task --cluster crm-prod --task-definition "$TASK_DEF" --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["node","dist/database/run-migrations.js"]}]}' \
            --region ${{ vars.AWS_REGION }} --query 'tasks[0].taskArn' --output text)
          aws ecs wait tasks-stopped --cluster crm-prod --tasks "$TASK_ARN" --region ${{ vars.AWS_REGION }}
          EXIT_CODE=$(aws ecs describe-tasks --cluster crm-prod --tasks "$TASK_ARN" --region ${{ vars.AWS_REGION }} --query 'tasks[0].containers[0].exitCode' --output text)
          if [ "$EXIT_CODE" != "0" ]; then echo "Migration failed with exit code $EXIT_CODE"; exit 1; fi

      - name: Smoke test
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            https://crm.stowe.cloud/health
